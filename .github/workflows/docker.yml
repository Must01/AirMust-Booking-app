name: Build Docker Images
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Images
        run: docker-compose build
